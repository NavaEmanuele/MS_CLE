version: 1
actions:
  - layer: "Indagini/Ind_pu.shp"
    add_fields:
      - name: "URL"
        type: "str"
        length: 254
      - name: "DESCR"
        type: "str"
        length: 254
    set_values:
      - field: "URL"
        expr: "url_template"
        template: "https://www.cartografia.servizirl.it/download/sismica/{ID_SPU}.pdf"
      - field: "DESCR"
        expr: "descr_from_dict"
        source_field: "cod"
    dict: "schemas/dicts/indagini.yaml"
  - layer: "Indagini/Ind_ln.shp"
